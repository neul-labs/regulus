# Regulus version — overridden by CI on release tag
regulusVersion=0.2.0-SNAPSHOT

# Publishing credentials are supplied via environment variables in CI:
#   ORG_GRADLE_PROJECT_sonatypeUsername
#   ORG_GRADLE_PROJECT_sonatypePassword
#   ORG_GRADLE_PROJECT_signingKey            (ASCII-armored PGP key)
#   ORG_GRADLE_PROJECT_signingPassword
#   ORG_GRADLE_PROJECT_gradle.publish.key    (Gradle Plugin Portal)
#   ORG_GRADLE_PROJECT_gradle.publish.secret
#
# Locally, drop the same keys in ~/.gradle/gradle.properties (NOT in this file).

org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
