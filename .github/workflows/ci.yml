name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Compliance scan
        run: ./gradlew --no-daemon regulusComplianceScan || true
        # `|| true` because the scan runs in *consumer* projects; the
        # framework repo itself doesn't declare profiles. This step is
        # here to surface the task's availability and catch task-level
        # regressions, not to fail on missing profiles.

      - name: CLI fat-jar smoke
        run: |
          ./gradlew --no-daemon :platform:cli:regulus-cli:shadowJar
          java -jar platform/cli/regulus-cli/build/libs/regulus-cli-*.jar --version

  docs:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('documentation/mkdocs.yml') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install MkDocs and Material
        run: |
          pip install \
            mkdocs \
            mkdocs-material \
            mkdocs-material-extensions \
            pymdown-extensions

      - name: Build docs (strict)
        working-directory: documentation
        run: mkdocs build --strict
