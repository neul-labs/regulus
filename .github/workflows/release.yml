name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Compute version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew --no-daemon build -PregulusVersion=${{ steps.ver.outputs.version }}

      - name: Doctor (sanity)
        run: ./gradlew --no-daemon regulusAdkDoctor -PregulusVersion=${{ steps.ver.outputs.version }}

      - name: Publish to Sonatype OSSRH
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          ./gradlew --no-daemon \
            publishToSonatype closeAndReleaseSonatypeStagingRepository \
            -PregulusVersion=${{ steps.ver.outputs.version }}

      - name: Publish Gradle plugin
        env:
          ORG_GRADLE_PROJECT_gradle.publish.key: ${{ secrets.GRADLE_PUBLISH_KEY }}
          ORG_GRADLE_PROJECT_gradle.publish.secret: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          ./gradlew --no-daemon :platform:gradle-plugin:regulus-compliance-gradle-plugin:publishPlugins \
            -PregulusVersion=${{ steps.ver.outputs.version }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push reference container
        run: |
          ./gradlew --no-daemon :examples:adk-vertex-agent-engine-deploy:jib \
            -Djib.to.image=ghcr.io/neul-labs/regulus-adk-demo \
            -PregulusVersion=${{ steps.ver.outputs.version }}
