name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # to create the GitHub Release + upload assets
  packages: write       # GHCR push

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # TIER 1 — ALWAYS RUNS
  # GitHub Release + CLI fat-jar attachment. Only needs GITHUB_TOKEN.
  # ─────────────────────────────────────────────────────────────────────
  github-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Compute version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build everything
        # `assemble` produces all jars/poms/sources/javadoc artefacts without
        # running tests. Tests run on `main` pushes via ci.yml; the release
        # workflow trusts that gate and focuses on artefact production.
        run: ./gradlew --no-daemon assemble -PregulusVersion=${{ steps.ver.outputs.version }}

      - name: Build CLI fat jar
        run: |
          ./gradlew --no-daemon :platform:cli:regulus-cli:shadowJar \
            -PregulusVersion=${{ steps.ver.outputs.version }}

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Pull the section for the current version.
          awk -v ver="${{ steps.ver.outputs.version }}" '
            $0 ~ "^## \\["ver"\\]" {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > .release-notes.md
          if [ ! -s .release-notes.md ]; then
            echo "Could not find ## [${{ steps.ver.outputs.version }}] in CHANGELOG.md" >&2
            exit 1
          fi
          {
            echo "notes<<EOF"
            cat .release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with CLI jar attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file .release-notes.md \
            platform/cli/regulus-cli/build/libs/regulus-cli-${{ steps.ver.outputs.version }}.jar

  # ─────────────────────────────────────────────────────────────────────
  # TIER 2 — GHCR CONTAINER IMAGE
  # Uses GITHUB_TOKEN. The first run for a new package on an org-level
  # namespace can fail because the package doesn't yet exist and
  # GitHub's auto-creation lags behind the first push. `continue-on-error`
  # so a GHCR hiccup doesn't fail the whole release run. See RELEASING.md
  # for the one-time package permission setup.
  # ─────────────────────────────────────────────────────────────────────
  ghcr:
    needs: github-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push reference container
        run: |
          ./gradlew --no-daemon :examples:adk-vertex-agent-engine-deploy:jib \
            -Djib.to.image=ghcr.io/neul-labs/regulus-adk-demo \
            -PregulusVersion=${{ needs.github-release.outputs.version }}

  # ─────────────────────────────────────────────────────────────────────
  # TIER 3 — MAVEN CENTRAL (Sonatype Central Portal)
  # Publishes via the new central.sonatype.com Portal — OSSRH was
  # sunset on 30 June 2025. Gated on the Portal user-token + signing
  # secrets being present. See RELEASING.md → "One-time admin setup".
  # ─────────────────────────────────────────────────────────────────────
  maven-central:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Check Central Portal gating
        id: gate
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -z "$SONATYPE_USERNAME" ] || [ -z "$SIGNING_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Maven Central publish skipped::Central Portal + signing secrets not configured. See RELEASING.md."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Maven Central via Central Portal
        if: steps.gate.outputs.ready == 'true'
        env:
          # The Vanniktech plugin reads these properties.
          # SONATYPE_USERNAME / SONATYPE_PASSWORD are the Portal user-token
          # values (NOT your Portal account password). Generate at
          # https://central.sonatype.com → View Account → Generate User Token.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          # publishAndReleaseToMavenCentral builds the bundle for every
          # publishable subproject, signs each artefact with the in-memory
          # GPG key, POSTs to the Portal API, polls for validation, and
          # auto-releases on success.
          ./gradlew --no-daemon publishAndReleaseToMavenCentral \
            -PregulusVersion=${{ needs.github-release.outputs.version }}

  # ─────────────────────────────────────────────────────────────────────
  # TIER 3 — GRADLE PLUGIN PORTAL
  # Gated on GRADLE_PUBLISH_KEY being present.
  # See RELEASING.md → "One-time admin setup".
  # ─────────────────────────────────────────────────────────────────────
  gradle-plugin-portal:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Check Plugin Portal gating
        id: gate
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
        run: |
          if [ -z "$GRADLE_PUBLISH_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Plugin Portal publish skipped::GRADLE_PUBLISH_KEY not configured. See RELEASING.md."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Gradle plugin
        if: steps.gate.outputs.ready == 'true'
        env:
          ORG_GRADLE_PROJECT_gradle.publish.key: ${{ secrets.GRADLE_PUBLISH_KEY }}
          ORG_GRADLE_PROJECT_gradle.publish.secret: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          ./gradlew --no-daemon :platform:gradle-plugin:regulus-compliance-gradle-plugin:publishPlugins \
            -PregulusVersion=${{ needs.github-release.outputs.version }}
