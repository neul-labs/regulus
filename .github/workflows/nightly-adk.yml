name: Nightly — ADK version tracking

on:
  schedule:
    - cron: '17 3 * * *'       # 03:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-adk
  cancel-in-progress: false

jobs:
  adk-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Resolve latest ADK 1.x
        id: adk
        run: |
          # Query Maven Central for the latest com.google.adk:google-adk version
          set -euo pipefail
          LATEST=$(curl -fsSL \
            "https://search.maven.org/solrsearch/select?q=g:com.google.adk+AND+a:google-adk&rows=1&wt=json" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['response']['docs'][0]['latestVersion'])")
          if [ -z "$LATEST" ]; then
            echo "Failed to resolve latest ADK version" >&2
            exit 1
          fi
          echo "Latest ADK 1.x: $LATEST"
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Build against latest ADK
        id: build
        run: |
          ./gradlew --no-daemon assemble -PadkVersion=${{ steps.adk.outputs.version }}

      - name: File issue on regression
        if: failure() && steps.adk.outcome == 'success' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const adkVersion = '${{ steps.adk.outputs.version }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'adk-drift',
              state: 'open',
              per_page: 5
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Nightly ADK build failed against ${adkVersion}`,
                labels: ['adk-drift'],
                body: [
                  `The nightly ADK-tracking job failed against ADK \`${adkVersion}\`.`,
                  ``,
                  `Run: ${runUrl}`,
                  ``,
                  `Reproduce locally:`,
                  ``,
                  '```bash',
                  `./gradlew assemble -PadkVersion=${adkVersion}`,
                  '```',
                  ``,
                  `See ADR-006 for the ADK-as-primary-runtime decision.`
                ].join('\n')
              });
              console.log(`Filed adk-drift issue for ADK ${adkVersion}`);
            } else {
              console.log(`adk-drift issue already open (#${existing.data[0].number}); not filing a duplicate.`);
            }
